<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinWise - Confirmar E-mail</title>
    <link rel="stylesheet" href="login-style.css">
    <style>
        .confirm-box {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 60vh; text-align: center; gap: 1rem;
        }
        .icon { font-size: 4rem; }
        .btn { padding: .75rem 2rem; border-radius: 8px; border: none;
               background: #4299e1; color: white; font-size: 1rem;
               cursor: pointer; text-decoration: none; margin-top: 1rem; }
    </style>
</head>
<body class="login-body">
    <main class="login-container">
        <div class="form-container">
            <div class="confirm-box" id="content">
                <div class="icon">⏳</div>
                <h2>Confirmando seu e-mail...</h2>
                <p>Aguarde um momento.</p>
            </div>
        </div>
    </main>
    <script type="module">
        const API_BASE = "https://finwiseback.onrender.com";
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");
        const content = document.getElementById("content");

        if (!token) {
            content.innerHTML = `<div class="icon">❌</div>
                <h2>Link inválido</h2><p>Token não encontrado na URL.</p>
                <a class="btn" href="login.html">Ir para o login</a>`;
        } else {
            fetch(`${API_BASE}/auth/confirmar?token=${token}`)
                .then(r => {
                    if (r.ok) {
                        content.innerHTML = `<div class="icon">✅</div>
                            <h2>E-mail confirmado!</h2>
                            <p>Sua conta está ativa. Faça login para continuar.</p>
                            <a class="btn" href="login.html">Fazer login</a>`;
                    } else {
                        content.innerHTML = `<div class="icon">❌</div>
                            <h2>Link inválido ou expirado</h2>
                            <p>Tente se cadastrar novamente.</p>
                            <a class="btn" href="login.html">Voltar</a>`;
                    }
                })
                .catch(() => {
                    content.innerHTML = `<div class="icon">❌</div>
                        <h2>Erro de conexão</h2>
                        <p>Não foi possível confirmar. Tente novamente.</p>
                        <a class="btn" href="login.html">Voltar</a>`;
                });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinWise - Trocar Senha</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login-style.css">
</head>
<body class="login-body">
    <main class="login-container">
        <div class="form-container">
            <form id="trocar-senha-form" class="form active">
                <h2>Trocar Senha</h2>

                <div class="form-group">
                    <label for="senha-atual">Senha atual</label>
                    <div class="password-input">
                        <input type="password" id="senha-atual" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="nova-senha">Nova senha</label>
                    <div class="password-input">
                        <input type="password" id="nova-senha" required minlength="6">
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmar-nova-senha">Confirmar nova senha</label>
                    <div class="password-input">
                        <input type="password" id="confirmar-nova-senha" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary login-btn">Alterar Senha</button>
                <a href="../Dashboard/dashboard.html"
                   style="display:block;text-align:center;margin-top:1rem;color:#4299e1;">
                    ← Voltar ao Dashboard
                </a>
            </form>
        </div>
    </main>

    <script src="login-script.js"></script>
    <script type="module">
        import { trocarSenha, getCurrentUser } from "../../auth/api-auth.js";

        // Redireciona se não estiver logado
        if (!getCurrentUser()) window.location.href = "login.html";

        document.getElementById("trocar-senha-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const senhaAtual = document.getElementById("senha-atual").value;
            const novaSenha = document.getElementById("nova-senha").value;
            const confirmar = document.getElementById("confirmar-nova-senha").value;

            if (novaSenha !== confirmar) {
                alert("❌ As novas senhas não coincidem!"); return;
            }
            if (novaSenha.length < 6) {
                alert("❌ A nova senha deve ter pelo menos 6 caracteres!"); return;
            }

            const btn = e.target.querySelector("button[type='submit']");
            btn.textContent = "Alterando..."; btn.disabled = true;

            try {
                await trocarSenha(senhaAtual, novaSenha);
                alert("✅ Senha alterada com sucesso!");
                window.location.href = "../Dashboard/dashboard.html";
            } catch (error) {
                alert(`❌ ${error.message}`);
                btn.textContent = "Alterar Senha"; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
